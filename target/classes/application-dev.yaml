spring:
  application:
  datasource:
    url: jdbc:h2:file:./data/loja;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2
  jpa:
   hibernate:
     ddl-auto: validate
  flyway:
    baseline-on-migrate: true
    clean-disabled: false
server:
  port: 8080
logging:
  level:
    root: info
